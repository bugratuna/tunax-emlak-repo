services:
  # 1. Veritabanı (PostGIS)
  postgres_gis:
    image: postgis/postgis:16-3.4
    container_name: rt_postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tunax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-tunax}
    # ⚠️  PRODUCTION: comment out or remove this ports block entirely.
    # PostgreSQL must NEVER be reachable from the host network in production.
    # Containers talk to each other via the service name "postgres_gis" — no host port needed.
    # Also ensure EC2 security group has NO inbound rule for port 5432 from 0.0.0.0/0.
    ports:
      - "5432:5432"  # LOCAL DEV ONLY
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tunax} -d ${POSTGRES_DB:-tunax}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis
  redis:
    image: redis:7-alpine
    container_name: rt_redis
    # ⚠️  PRODUCTION: comment out or remove this ports block entirely.
    # Redis must NEVER be reachable from the host network in production.
    # Containers talk to each other via the service name "redis" — no host port needed.
    # Also ensure EC2 security group has NO inbound rule for port 6379 from 0.0.0.0/0.
    ports:
      - "6379:6379"  # LOCAL DEV ONLY
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Tüm Uygulamalar (NextJS, NestJS, Worker)
  main_app:
    build: .
    container_name: rt_full_stack
    restart: always
    ports:
      - "3000:3000" # NextJS
      - "4000:4000" # NestJS API
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tunax}:${POSTGRES_PASSWORD}@postgres_gis:5432/${POSTGRES_DB:-tunax}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres_gis:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. pgAdmin (LOCAL DEV ONLY — do NOT expose in production)
  # Credentials are read from PGADMIN_DEFAULT_EMAIL and PGADMIN_DEFAULT_PASSWORD
  # env vars. Set these in a local .env file (gitignored), never commit them.
  pgadmin:
    image: dpage/pgadmin4
    container_name: rt_pgadmin_ui
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
    ports:
      - "8080:80"
    depends_on:
      - postgres_gis

volumes:
  postgis_data:
  redis_data:
