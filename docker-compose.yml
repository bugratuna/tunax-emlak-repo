services:
  # 1. Veritabanı (PostGIS)
  postgres_gis:
    image: postgis/postgis:16-3.4
    container_name: arep_postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tunax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tunax123}
      POSTGRES_DB: ${POSTGRES_DB:-tunax}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tunax} -d ${POSTGRES_DB:-tunax}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis
  redis:
    image: redis:7-alpine
    container_name: arep_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Tüm Uygulamalar (NextJS, NestJS, Worker)
  main_app:
    build: .
    container_name: arep_full_stack
    restart: always
    ports:
      - "3000:3000" # NextJS
      - "4000:4000" # NestJS API
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tunax}:${POSTGRES_PASSWORD:-tunax123}@postgres_gis:5432/${POSTGRES_DB:-tunax}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres_gis:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. pgAdmin (Opsiyonel UI)
  pgadmin:
    image: dpage/pgadmin4
    container_name: arep_pgadmin_ui
    environment:
      PGADMIN_DEFAULT_EMAIL: test@test.com
      PGADMIN_DEFAULT_PASSWORD: bgrtn123
    ports:
      - "8080:80"
    depends_on:
      - postgres_gis

volumes:
  postgis_data:
  redis_data: