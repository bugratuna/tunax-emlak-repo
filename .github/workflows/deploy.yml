# .github/workflows/deploy.yml
name: Build Push Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }} \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/tunax-main:latest \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/tunax-main:${{ github.sha }} \
            --push .

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Deploy on EC2
        run: |
          set -e
          cd /opt/realty-tunax

          export AWS_REGION=eu-north-1
          export ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin \
            ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

          # Pull the new image before touching running services
          docker compose --env-file .env -f compose.yml pull

          # Run database migrations in a one-shot container.
          # compose run automatically starts declared dependencies (postgres_gis, redis)
          # and waits for their health checks before executing the command.
          # The container is removed on exit (--rm).
          # `set -e` above ensures this step fails the workflow if migrations fail,
          # preventing a broken schema from reaching the running application.
          docker compose --env-file .env -f compose.yml run --rm \
            main_app sh -c "cd /app/apps/api && npm run migration:run"

          # Bring all services up with the new image.
          # main_app is recreated with the new image; postgres_gis and redis
          # continue running uninterrupted (no `compose down` = less downtime).
          docker compose --env-file .env -f compose.yml up -d