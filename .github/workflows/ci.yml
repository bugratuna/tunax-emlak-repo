name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── API ────────────────────────────────────────────────────────────────
      # `nest build` is pure TypeScript compilation — no env vars needed.
      # validateEnv() is called only at `nest start`, not at build time.
      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Lint API
        working-directory: apps/api
        run: npm run lint

      - name: Test API
        working-directory: apps/api
        run: npm test

      - name: Build API
        working-directory: apps/api
        run: npm run build

      # ── Web ───────────────────────────────────────────────────────────────
      # `next build` inlines NEXT_PUBLIC_* vars into the browser bundle.
      # API_BASE_URL_SERVER and INTERNAL_API_KEY are server-only and validated
      # per-request in lib/api/client.ts — they are NOT needed at build time.
      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint Web
        working-directory: apps/web
        run: npm run lint

      # apps/web has no test script — step intentionally omitted

      - name: Build Web
        working-directory: apps/web
        run: npm run build
        env:
          # CI placeholder — safe to commit. This value is only used for
          # bundle compilation; the real value is set in the production
          # hosting panel (Vercel / Railway / etc.) and never committed.
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001

      # ── Worker ────────────────────────────────────────────────────────────
      # `tsc` is pure compilation — no env vars needed.
      # validateWorkerEnv() is called only at runtime (bootstrap()), not here.
      - name: Install Worker dependencies
        working-directory: apps/worker
        run: npm ci

      # apps/worker has no lint or test script — steps intentionally omitted

      - name: Build Worker
        working-directory: apps/worker
        run: npm run build

      # ── Agent ─────────────────────────────────────────────────────────────
      - name: Install Agent dependencies
        working-directory: apps/agent
        run: npm ci

      # apps/agent has no lint, test, or build script — steps intentionally omitted
